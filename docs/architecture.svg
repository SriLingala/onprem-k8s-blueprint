<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">On-prem Kubernetes blueprint architecture</title>
  <desc id="desc">Central fleet control deploys platform add-ons to RKE2 datacentre clusters and k3s edge clusters with shared observability, ingress, certificates, GitOps, policy, storage, backup, and registry services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="control" x1="140" y1="72" x2="1060" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#164e63"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10V2Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>

  <text x="600" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">On-prem Kubernetes Blueprint</text>
  <text x="600" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Consistent platform layer across datacentres and edge sites</text>

  <rect x="140" y="108" width="920" height="110" rx="22" fill="url(#control)" filter="url(#shadow)"/>
  <text x="600" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">Central Fleet Control</text>
  <text x="600" y="180" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#dbeafe">Rancher Manager or Argo CD ApplicationSet</text>
  <text x="600" y="202" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#bfdbfe">GitOps sync, policy baselines, fleet visibility, upgrade waves</text>

  <path d="M600 218V278" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M600 248H260V278" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M600 248H940V278" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="286" width="300" height="190" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="230" y="326" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Datacentre A</text>
    <text x="230" y="354" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">RKE2 HA cluster</text>
    <rect x="115" y="382" width="78" height="48" rx="10" fill="#e0f2fe" stroke="#38bdf8"/>
    <rect x="211" y="382" width="78" height="48" rx="10" fill="#e0f2fe" stroke="#38bdf8"/>
    <rect x="307" y="382" width="38" height="48" rx="10" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="230" y="414" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#075985">3 control-plane nodes</text>
    <rect x="115" y="444" width="230" height="20" rx="10" fill="#dcfce7"/>
    <text x="230" y="459" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534">N worker nodes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="286" width="300" height="190" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="600" y="326" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Datacentre B</text>
    <text x="600" y="354" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">RKE2 HA cluster</text>
    <rect x="485" y="382" width="78" height="48" rx="10" fill="#e0f2fe" stroke="#38bdf8"/>
    <rect x="581" y="382" width="78" height="48" rx="10" fill="#e0f2fe" stroke="#38bdf8"/>
    <rect x="677" y="382" width="38" height="48" rx="10" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="600" y="414" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#075985">3 control-plane nodes</text>
    <rect x="485" y="444" width="230" height="20" rx="10" fill="#dcfce7"/>
    <text x="600" y="459" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534">N worker nodes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="286" width="300" height="190" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="970" y="326" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Edge / Factory</text>
    <text x="970" y="354" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">k3s lightweight cluster</text>
    <rect x="870" y="382" width="90" height="48" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
    <rect x="980" y="382" width="90" height="48" rx="10" fill="#dcfce7" stroke="#22c55e"/>
    <text x="915" y="412" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e">1 server</text>
    <text x="1025" y="412" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#166534">N agents</text>
    <text x="970" y="459" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">ARM / x86, intermittent links</text>
  </g>

  <rect x="110" y="535" width="980" height="110" rx="22" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="600" y="570" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">Shared Platform Add-ons via GitOps</text>

  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">
    <rect x="150" y="596" width="120" height="30" rx="15" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="210" y="616" text-anchor="middle" fill="#1d4ed8">Argo CD</text>
    <rect x="290" y="596" width="120" height="30" rx="15" fill="#f0fdf4" stroke="#86efac"/>
    <text x="350" y="616" text-anchor="middle" fill="#15803d">Prometheus</text>
    <rect x="430" y="596" width="100" height="30" rx="15" fill="#fdf4ff" stroke="#e879f9"/>
    <text x="480" y="616" text-anchor="middle" fill="#a21caf">Loki</text>
    <rect x="550" y="596" width="130" height="30" rx="15" fill="#fff7ed" stroke="#fdba74"/>
    <text x="615" y="616" text-anchor="middle" fill="#c2410c">cert-manager</text>
    <rect x="700" y="596" width="140" height="30" rx="15" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="770" y="616" text-anchor="middle" fill="#0e7490">Ingress NGINX</text>
    <rect x="860" y="596" width="180" height="30" rx="15" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="950" y="616" text-anchor="middle" fill="#334155">OPA Gatekeeper</text>
  </g>

  <text x="600" y="681" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Supporting services: MetalLB, Vault / SPIFFE, Longhorn or Ceph, Velero, internal registry mirrors, Terraform remote state</text>
</svg>
